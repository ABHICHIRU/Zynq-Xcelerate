<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYSHIELD HUD: TACTICAL SIGNAL ANALYZER</title>
    <style>
        :root {
            --bg-color: #050805;
            --main-green: #00ff41;
            --amber: #ffb000;
            --danger: #ff0000;
            --border-style: 2px solid var(--main-green);
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            height: 95vh;
        }

        .header {
            grid-column: 1 / 3;
            border: var(--border-style);
            padding: 10px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 5px;
            background: rgba(0, 255, 65, 0.1);
        }

        .main-display {
            border: var(--border-style);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #drop-zone {
            width: 90%;
            min-height: 150px;
            border: 2px dashed var(--main-green);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0, 255, 65, 0.05);
            margin-bottom: 20px;
        }

        #results-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .tactical-card {
            border: 1px solid var(--main-green);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-header {
            border-bottom: 1px solid var(--main-green);
            padding-bottom: 5px;
            font-size: 14px;
            color: var(--amber);
        }

        .card-body {
            display: flex;
            gap: 10px;
        }

        .card-visual {
            width: 80px;
            height: 80px;
            border: 1px solid var(--main-green);
        }

        .card-stats {
            flex: 1;
            font-size: 12px;
        }

        .alert-flash {
            color: var(--danger);
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
        }

        #loading { display: none; margin-bottom: 10px; color: var(--amber); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            SKYSHIELD v6.0 ECHELON // TACTICAL MULTI-SCAN HUD
        </div>

        <div class="main-display">
            <div id="drop-zone">
                <div>
                    [ RADAR BATCH SCAN ZONE ]<br><br>
                    DROP MULTIPLE SIGNAL FILES (.NPY)<br>
                    OR CLICK TO UPLOAD BATCH
                </div>
            </div>
            <div id="loading">DECRYPTING SIGNAL BATCH...</div>
            <div id="results-container"></div>
        </div>

        <div class="side-panel">
            <div class="status-box">
                <div class="label">SYSTEM STATUS:</div>
                <div class="value">ACTIVE SCANNING</div>
                <div style="margin-top:10px;" class="label">BATCH QUEUE:</div>
                <div id="queue-count" class="value">0 SIGNALS</div>
            </div>

            <div id="global-alert" style="text-align: center; font-size: 18px; margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const resultsContainer = document.getElementById('results-container');
        const queueCount = document.getElementById('queue-count');
        const globalAlert = document.getElementById('global-alert');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleBatchUpload(files);
        });

        dropZone.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.npy';
            input.multiple = true;
            input.onchange = (e) => handleBatchUpload(e.target.files);
            input.click();
        });

        async function handleBatchUpload(files) {
            document.getElementById('loading').style.display = 'block';
            resultsContainer.innerHTML = ''; 
            let totalDetections = 0;
            let threatFound = false;

            for (let file of files) {
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/analyze', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    // Decode results can be multiple cards per file
                    data.batch_results.forEach(res => {
                        createTacticalCard(res.name, res);
                        if (res.prediction.is_threat) threatFound = true;
                        totalDetections++;
                    });
                } catch (err) {
                    console.error("ANALYSIS FAILED", err);
                }
            }

            queueCount.innerText = `${totalDetections} DETECTIONS`;
            document.getElementById('loading').style.display = 'none';
            
            if (threatFound) {
                globalAlert.innerText = "!!! THREAT ENCOUNTERED IN SCAN !!!";
                globalAlert.className = 'alert-active';
            } else {
                globalAlert.innerText = "SCAN COMPLETE: ENVIROMENT CLEAR";
                globalAlert.className = '';
            }
        }

        function createTacticalCard(name, data) {
            const pred = data.prediction;
            const card = document.createElement('div');
            card.className = 'tactical-card';
            
            const threatStyle = pred.is_threat ? 'color: var(--danger);' : 'color: var(--main-green);';
            
            card.innerHTML = `
                <div class="card-header">${name}</div>
                <div class="card-body">
                    <img class="card-visual" src="data:image/png;base64,${data.visual}">
                    <div class="card-stats">
                        <div>TYPE: ${pred.type}</div>
                        <div style="${threatStyle}">STATUS: ${pred.is_threat ? 'THREAT' : 'CLEAR'}</div>
                        <div>ACTION: ${pred.code}</div>
                    </div>
                </div>
                ${pred.is_threat ? `<div class="alert-flash">ALERT: ${pred.action}</div>` : ''}
            `;
            resultsContainer.appendChild(card);
        }
    </script>
</body>
</html>
</body>
</html>
