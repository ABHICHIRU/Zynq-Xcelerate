<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYSHIELD HUD: TACTICAL SIGNAL ANALYZER</title>
    <style>
        :root {
            --bg-color: #050805;
            --main-green: #00ff41;
            --amber: #ffb000;
            --danger: #ff0000;
            --border-style: 2px solid var(--main-green);
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
            height: 95vh;
        }

        .header {
            grid-column: 1 / 3;
            border: var(--border-style);
            padding: 10px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 5px;
            background: rgba(0, 255, 65, 0.1);
        }

        .main-display {
            border: var(--border-style);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #drop-zone {
            width: 80%;
            height: 60%;
            border: 2px dashed var(--main-green);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0, 255, 65, 0.05);
        }

        #drop-zone.dragover {
            background: rgba(0, 255, 65, 0.2);
            border-style: solid;
        }

        .side-panel {
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .visual-frame {
            width: 100%;
            aspect-ratio: 1/1;
            border: 1px solid var(--main-green);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #spectrogram-img {
            max-width: 100%;
            display: none;
        }

        .status-box {
            border: 1px solid var(--main-green);
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .label { font-weight: bold; color: var(--amber); }
        .value { margin-left: 10px; }

        .alert-active {
            color: var(--danger);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        #loading { display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            SKYSHIELD v6.0 ECHELON // TACTICAL HUD
        </div>

        <div class="main-display">
            <div id="drop-zone">
                <div>
                    [ RADAR SCAN ZONE ]<br><br>
                    DROP RF SIGNAL DATA (.NPY)<br>
                    OR CLICK TO UPLOAD
                </div>
            </div>
            <div id="loading">ANALYZING SIGNAL SPECTRUM...</div>
        </div>

        <div class="side-panel">
            <div class="visual-frame">
                <img id="spectrogram-img" src="" alt="Spectrogram">
                <div id="no-signal">NO SIGNAL DETECTED</div>
            </div>

            <div class="status-box">
                <div><span class="label">CLASSIFICATION:</span> <span class="value" id="res-type">---</span></div>
                <div><span class="label">THREAT STATUS:</span> <span class="value" id="res-threat">---</span></div>
                <div><span class="label">JAMMING INDX:</span> <span class="value" id="res-jammer">---</span></div>
                <div style="margin-top: 10px; border-top: 1px solid var(--main-green); padding-top: 5px;">
                    <span class="label">HARDWARE ACTION:</span><br>
                    <span class="value" id="res-action" style="font-size: 14px;">STANDBY...</span>
                </div>
            </div>

            <div id="alert-banner" style="text-align: center; font-size: 20px;"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const spectrogramImg = document.getElementById('spectrogram-img');
        const noSignal = document.getElementById('no-signal');
        const alertBanner = document.getElementById('alert-banner');
        
        // Drag and Drop Logic
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleUpload(file);
        });

        dropZone.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.npy';
            input.onchange = (e) => handleUpload(e.target.files[0]);
            input.click();
        });

        async function handleUpload(file) {
            document.getElementById('loading').style.display = 'block';
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                updateHUD(data);
            } catch (err) {
                console.error("ANALYSIS FAILED", err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateHUD(data) {
            const pred = data.prediction;
            
            // Update Text
            document.getElementById('res-type').innerText = pred.type;
            document.getElementById('res-threat').innerText = pred.is_threat ? "POSITIVE" : "NEGATIVE";
            document.getElementById('res-threat').style.color = pred.is_threat ? "var(--danger)" : "var(--main-green)";
            
            document.getElementById('res-jammer').innerText = pred.jammer ? "ACTIVE" : "NONE";
            document.getElementById('res-jammer').style.color = pred.jammer ? "var(--danger)" : "var(--main-green)";
            
            document.getElementById('res-action').innerText = pred.action;

            // Update Visual
            spectrogramImg.src = `data:image/png;base64,${data.visual}`;
            spectrogramImg.style.display = 'block';
            noSignal.style.display = 'none';

            // Alert Banner
            if (pred.is_threat) {
                alertBanner.innerText = "!!! THREAT DETECTED !!!";
                alertBanner.classList.add('alert-active');
            } else {
                alertBanner.innerText = "SCAN CLEAR";
                alertBanner.classList.remove('alert-active');
            }
        }
    </script>
</body>
</html>
